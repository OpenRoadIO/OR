<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OpenRoadIO</title>
    <script type="text/javascript">
      // GitHub Pages SPA Hack
      var pathSegmentsToKeep = 1; // Change to 0 if using a custom domain later
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.replace(/\?/g, '~q~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
